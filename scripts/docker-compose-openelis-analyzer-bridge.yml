services:
  oe-analyzer-bridge:
    image: itechuw/openelis-analyzer-bridge:3.0.4
    platform: linux/amd64
    ports:
      - "${OE_ANALYZER_BRIDGE_PORT:-8442}:8443" # HTTPS API port
      - "${OE_ASTM_ANALYZER_BRIDGE_PORT:-12000}:12001" # ASTM listen port
    volumes:
      - "${OPENELIS_CONFIG_PATH}/astm/configuration.yml:/app/configuration.yml:ro"
      - "${OPENELIS_TRUST_STORE:-key_trust-store-volume}:/etc/openelis-global"
      - "${OPENELIS_ANALYZER_DROPS_MOUNT_PATH:-${OPENELIS_CONFIG_PATH}/analyzer-drops}:/data/analyzer-drops:ro"
      - analyzer-imports:/data/analyzer-imports
      - bridge-state:/data/openelis-analyzer-bridge
    environment:
      SPRING_PROFILE: dev
      LOGGING_LEVEL_ORG_ITECH: TRACE
      # Bridge admin/upload UI Basic Auth. Aligned with OE admin so the
      # distro ships one credential pair and closes the bridge/changeme
      # default. Keys per bridge SecurityConfig (BRIDGE_AUTH_PASSWORD is a no-op).
      BRIDGE_SECURITY_USERNAME: admin
      BRIDGE_SECURITY_PASSWORD: ${OE_ADMIN_PASSWORD:-adminADMIN!}
      BRIDGE_FILE_ENABLED: "true"
      # Point the bridge at the named volume mount. Must match the
      # volume mount path above. Spring Boot maps this env var to the
      # bridge.file.state-store-path config property.
      BRIDGE_FILE_STATE_STORE_PATH: /data/openelis-analyzer-bridge/state.db
      # Align with CI harness: HttpForwardingRouter appends /astm, /hl7, /csv
      ORG_ITECH_AHB_FORWARD_HTTP_SERVER_URI: https://openelisglobal-webapp:8443/OpenELIS-Global/analyzer
      ORG_ITECH_AHB_FORWARD_HTTP_SERVER_USERNAME: ${ORG_ITECH_AHB_FORWARD_HTTP_SERVER_USERNAME:-admin}
      ORG_ITECH_AHB_FORWARD_HTTP_SERVER_PASSWORD: ${OE_ADMIN_PASSWORD:-adminADMIN!}
      ORG_ITECH_AHB_FORWARD_HTTP_SERVER_INSECURE_TLS: "true"
      JDK_JAVA_OPTIONS: -Djdk.internal.httpclient.disableHostnameVerification=true
      JAVA_OPTS: |
        -Djavax.net.ssl.trustStore=${SSL_TRUSTSTORE_PATH} 
        -Djavax.net.ssl.trustStorePassword=${SSL_TRUSTSTORE_PASSWORD}
        -Djavax.net.ssl.trustStoreType=pkcs12
    networks:
      - ozone
      - web
    restart: unless-stopped

volumes:
  analyzer-imports: ~
  bridge-state: ~
